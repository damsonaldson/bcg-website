<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Received - Brightwood Consulting Group</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Source Code Pro', 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            line-height: 1.6;
            color: #e0e0e0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 1rem;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 700;
        }

        p {
            color: #cccccc;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .back-link {
            display: inline-block;
            background: #4a4a4a;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.3s;
            border: 1px solid #666666;
        }

        .back-link:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <h1>Message Received.</h1>
    <p>Thank you for reaching out. We will get back to you shortly.</p>
    <a href="/" class="back-link">Return Home</a>
</body>
</html>
